[env:tally_hub]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_protocol = esptool
board_build.arduino.memory_type = qio_opi
; radio_test.cpp defines its own setup()/loop() — must not link together with main.cpp
build_src_filter = +<*> -<radio_test.cpp>
build_flags =
    ; Native USB-Serial-JTAG console (GPIO19/20). On the S3 this does NOT
    ; conflict with the E28 on GPIO 1/3 — UART0 here is GPIO 43/44.
    ; Logs go to BOTH the native USB port (Serial) and the UART bridge
    ; port (Serial0), so either cable shows them.
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=0
    ; Uncomment for radio bring-up without an ATEM (cam1 RED/GREEN toggle):
    ; -DLORA_TEST_MODE
lib_deps =
    Wire
    WiFi
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.5
    adafruit/Adafruit BusIO@^1.14.1
lib_extra_dirs =
    ../lib
    ../Arduino/libraries

; Standalone rainbow LoRa test firmware (radio_test.cpp only, no ATEM).
; Inherits board/flash/build settings from the main env so they can't drift.
[env:tally_hub_radiotest]
extends = env:tally_hub
build_src_filter = +<radio_test.cpp>
lib_deps =
    Wire
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.5
    adafruit/Adafruit BusIO@^1.14.1
