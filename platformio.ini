; PlatformIO Configuration for Tally Light System
; Master: ESP32-S3 + E28 2G4M27S (27dBm)
; Slave:  ESP32 + E28 2G4M12SX (12dBm)

[platformio]
default_envs = master

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
lib_deps = 
    SPI
    Wire
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.5

; =============================================================================
; Master Controller - ESP32-S3-CAM + E28 2G4M27S
; =============================================================================
[env:master]
board = esp32-s3-devkitc-1
build_src_filter = +<../master/src/>
; USB-OTG upload settings
upload_protocol = esptool
board_build.arduino.memory_type = qio_opi
build_flags = 
    -DTALLY_MASTER=1
    -DMAX_CAMERAS=8
    ; USB CDC is disabled to use UART0 (TX/RX) on COM4
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DARDUINO_USB_MODE=0
    ; ESP32-S3 SPI pins (FSPI)
    -DE28_PIN_MISO=13
    -DE28_PIN_MOSI=11
    -DE28_PIN_SCK=12
    -DE28_PIN_NSS=10
    -DE28_PIN_BUSY=9
    -DE28_PIN_DIO1=3
    -DE28_PIN_RESET=8
    ; E28 2G4M27S supports +27dBm TX power
    -DRADIO_TX_POWER=13

; =============================================================================
; Slave Tally - ESP32 + E28 2G4M12SX  
; =============================================================================
[env:slave]
board = esp32dev
build_src_filter = +<../slave/src/>
build_flags = 
    -DTALLY_SLAVE=1
    -DCAMERA_ID=1
    ; Standard ESP32 SPI pins
    -DE28_PIN_MISO=19
    -DE28_PIN_MOSI=23
    -DE28_PIN_SCK=18
    -DE28_PIN_NSS=5
    -DE28_PIN_BUSY=4
    -DE28_PIN_DIO1=2
    -DE28_PIN_RESET=14

; Additional slave configs for different camera IDs
[env:slave_cam2]
extends = env:slave
build_flags = 
    ${env:slave.build_flags}
    -DCAMERA_ID=2

[env:slave_cam3]
extends = env:slave
build_flags = 
    ${env:slave.build_flags}
    -DCAMERA_ID=3

[env:slave_cam4]
extends = env:slave
build_flags = 
    ${env:slave.build_flags}
    -DCAMERA_ID=4

