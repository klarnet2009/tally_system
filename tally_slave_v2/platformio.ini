[env:tally_slave_v2]
platform = espressif32@6.9.0
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.flash_mode = dio
; radio_test.cpp defines its own setup()/loop() — must not link with main.cpp
build_src_filter = +<*> -<radio_test.cpp>

; Default = continuous RX (reliability first). Camera ID is set at runtime
; (BOOT button / serial "id N", stored in NVS), so ONE binary serves every
; camera — no per-camera build env.
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

lib_deps =
    adafruit/Adafruit NeoPixel@^1.12.0

lib_extra_dirs =
    ../lib

; Battery build: duty-cycle RX (~2x battery life) at the cost of a brief deaf
; window on each re-arm. Use only where runtime matters more than reliability.
[env:tally_slave_v2_lowpower]
extends = env:tally_slave_v2
build_flags =
    ${env:tally_slave_v2.build_flags}
    -DPOWER_SAVE

; Standalone rainbow RX test firmware
[env:tally_slave_v2_radiotest]
extends = env:tally_slave_v2
build_src_filter = +<radio_test.cpp>
