[env:tally_slave_v2]
platform = espressif32@6.9.0
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.flash_mode = dio
; radio_test.cpp defines its own setup()/loop() — must not link with main.cpp
build_src_filter = +<*> -<radio_test.cpp>

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DPOWER_SAVE

lib_deps =
    adafruit/Adafruit NeoPixel@^1.12.0

lib_extra_dirs =
    ../lib

; Per-camera builds (main env defaults to SLAVE_CAM_ID=1)
[env:tally_slave_v2_cam2]
extends = env:tally_slave_v2
build_flags =
    ${env:tally_slave_v2.build_flags}
    -DSLAVE_CAM_ID=2

[env:tally_slave_v2_cam3]
extends = env:tally_slave_v2
build_flags =
    ${env:tally_slave_v2.build_flags}
    -DSLAVE_CAM_ID=3

[env:tally_slave_v2_cam4]
extends = env:tally_slave_v2
build_flags =
    ${env:tally_slave_v2.build_flags}
    -DSLAVE_CAM_ID=4

; Standalone rainbow RX test firmware
[env:tally_slave_v2_radiotest]
extends = env:tally_slave_v2
build_src_filter = +<radio_test.cpp>
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
